<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON RUNWAY | Fashion</title>
    <style>
        /* Cloud Dancer 配色底色 */
        body { background-color: #f0eee9; color: #4a4a4a; font-family: 'Times New Roman', serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        
        .container { text-align: center; padding: 40px; background: #ffffff; border-radius: 2px; box-shadow: 0 20px 50px rgba(0,0,0,0.05); width: 90%; max-width: 500px; border-top: 5px solid #e6d5b8; /* 淡金邊框 */ }
        
        /* 淡金色標題 */
        h1 { font-size: 2rem; letter-spacing: 5px; color: #c5a059; margin-bottom: 30px; font-weight: 300; }
        
        #display-area { width: 100%; height: 450px; background: #fdfcfb; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 1px solid #eee; position: relative; }
        
        img { max-width: 100%; max-height: 100%; object-fit: cover; transition: 0.8s ease-in-out; }
        
        .btn-group { margin-top: 40px; }
        
        /* 淡金按鈕樣式 */
        .btn { 
            background: #e6d5b8; color: #5a4d3a; border: none; 
            padding: 15px 40px; font-size: 14px; letter-spacing: 2px;
            cursor: pointer; transition: 0.4s; border-radius: 0px;
            box-shadow: 0 4px 15px rgba(230, 213, 184, 0.4);
        }
        
        .btn:hover { background: #c5a059; color: white; transform: translateY(-2px); }
        .btn:active { transform: translateY(0); }
        
        #loader { display: none; width: 30px; height: 30px; border: 2px solid #f3f3f3; border-top: 2px solid #c5a059; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <h1>NEON RUNWAY</h1>
        <div id="display-area">
            <div id="loader"></div>
            <img id="fashion-img" src="https://picsum.photos/800/1200?fashion=8" alt="Fashion">
        </div>
        <div class="btn-group">
            <button class="btn" onclick="changeImage()">不喜歡？更換造型</button>
        </div>
    </div>

    <script>
        function changeImage() {
            const img = document.getElementById('fashion-img');
            const loader = document.getElementById('loader');
            img.style.opacity = '0';
            loader.style.display = 'block';
            
            setTimeout(() => {
                img.src = "https://picsum.photos/800/1200?random=" + Math.random();
                img.onload = () => {
                    loader.style.display = 'none';
                    img.style.opacity = '1';
                };
            }, 600);
        }
    </script>
</body>
</html>
