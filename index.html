<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>霓虹T台 Neon Runway</title>
    <style>
        body { background-color: #050505; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .card { background: #111; padding: 30px; border-radius: 20px; border: 1px solid #333; text-align: center; box-shadow: 0 0 20px rgba(188, 19, 254, 0.2); width: 90%; max-width: 500px; }
        h1 { font-size: 2.5rem; color: #fff; text-shadow: 0 0 10px #bc13fe; margin-bottom: 20px; }
        #display-area { width: 100%; height: 350px; background: #000; border-radius: 10px; margin-bottom: 25px; display: flex; align-items: center; justify-content: center; border: 1px solid #bc13fe; overflow: hidden; }
        img { max-width: 100%; max-height: 100%; object-fit: cover; }
        .btn { background: transparent; color: #00f2ff; border: 2px solid #00f2ff; padding: 12px 25px; border-radius: 50px; font-weight: bold; cursor: pointer; box-shadow: 0 0 10px rgba(0, 242, 255, 0.5); transition: 0.3s; }
        .btn:active { transform: scale(0.9); }
        .btn:hover { background: #00f2ff; color: #000; }
    </style>
</head>
<body>
    <div class="card">
        <h1>NEON RUNWAY</h1>
        <div id="display-area">
            <img id="fashion-img" src="https://picsum.photos/800/1000?fashion=1" alt="Fashion">
        </div>
        <button class="btn" onclick="changeImage()">🔄 不喜歡？換一張</button>
    </div>

    <script>
        function changeImage() {
            const img = document.getElementById('fashion-img');
            img.style.opacity = '0.3';
            // 隨機換一張時尚感照片
            setTimeout(() => {
                img.src = "https://picsum.photos/800/1000?random=" + Math.random();
                img.onload = () => { img.style.opacity = '1'; };
            }, 300);
        }
    </script>
</body>
</html>
